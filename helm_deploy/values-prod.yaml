---
# Per environment values which override defaults in hmpps-dps-reconciliation/values.yaml

generic-service:
  ingress:
    host: dps-reconciliation.hmpps.service.justice.gov.uk

  env:
    HMPPS_AUTH_URL: "https://sign-in.hmpps.service.justice.gov.uk/auth"
    PRISON_API_URL: "https://prison-api.prison.service.justice.gov.uk"
    PRISONER_SEARCH_API_URL: "https://prisoner-search.prison.service.justice.gov.uk"

  # The name has max length of 27 chars (Cronjob name max length is 52 chars, including prefix "hmpps-dps-reconciliation-")
  # The type must exist in enum BatchType
  batchjobs:
    - name: detect-non-matches
      type: DETECT_NON_MATCHES
      schedule: "0 */2 * * *"

  postgresDatabaseRestore:
    enabled: true
    namespace_secrets:
      rds-database:
        DB_NAME: "database_name"
        DB_USER: "database_username"
        DB_PASS: "database_password"
        DB_HOST: "rds_instance_address"
      dps-rds-instance-output-preprod:
        DB_NAME_PREPROD: "database_name"
        DB_USER_PREPROD: "database_username"
        DB_PASS_PREPROD: "database_password"
        DB_HOST_PREPROD: "rds_instance_address"
      s3-db-restore-bucket:
        BUCKET_NAME: "bucket_name"

# CloudPlatform AlertManager receiver to route prometheus alerts to slack
# See https://user-guide.cloud-platform.service.justice.gov.uk/documentation/monitoring-an-app/how-to-create-alarms.html#creating-your-own-custom-alerts
generic-prometheus-alerts:
  alertSeverity: syscon
  rdsAlertsDatabases:
    cloud-platform-b58b51dd02b491a0: "DPS reconciliation"
  sqsNumberAlertQueueNames:
    - "syscon-devs-prod-hmpps_dps_reconciliation_dl_queue"
